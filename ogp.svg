<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#0c1d38"/>
      <stop offset="0.55" stop-color="#071528"/>
      <stop offset="1" stop-color="#030a15"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#cfe0ff" stop-opacity="0.12"/>
      <stop offset="0.45" stop-color="#9ab4dc" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#9ab4dc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f0dcae" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#f0dcae" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pearl" cx="0.36" cy="0.32" r="0.72">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="0.45" stop-color="#ece0c4"/>
      <stop offset="1" stop-color="#9c855f"/>
    </radialGradient>
    <radialGradient id="spec" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfe2ff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#cfe2ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c9a86a"/>
      <stop offset="0.5" stop-color="#e6d3a3"/>
      <stop offset="1" stop-color="#b8975a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>

  <!-- faint light shafts -->
  <polygon points="300,0 360,0 470,1200 250,1200" fill="url(#ray)"/>
  <polygon points="720,0 800,0 900,1200 690,1200" fill="url(#ray)"/>

  <!-- marine snow -->
  <g fill="#dce8ff">
    <circle cx="180" cy="360" r="2.5" opacity="0.5"/>
    <circle cx="1040" cy="430" r="2" opacity="0.45"/>
    <circle cx="980" cy="780" r="3" opacity="0.4"/>
    <circle cx="250" cy="840" r="2" opacity="0.5"/>
    <circle cx="620" cy="330" r="1.8" opacity="0.4"/>
    <circle cx="120" cy="640" r="2.2" opacity="0.45"/>
    <circle cx="1080" cy="600" r="1.8" opacity="0.4"/>
    <circle cx="470" cy="880" r="2" opacity="0.4"/>
    <circle cx="860" cy="350" r="1.6" opacity="0.35"/>
  </g>

  <!-- pearl (龍涎香) -->
  <circle cx="322" cy="600" r="300" fill="url(#halo)"/>
  <circle cx="322" cy="600" r="190" fill="url(#aura)"/>
  <circle cx="322" cy="600" r="136" fill="url(#pearl)"/>
  <g fill="none" stroke="#8d7651" stroke-width="1" opacity="0.16">
    <circle cx="322" cy="600" r="42"/>
    <circle cx="322" cy="600" r="78"/>
    <circle cx="322" cy="600" r="110"/>
  </g>
  <circle cx="322" cy="600" r="136" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.8"/>
  <ellipse cx="288" cy="562" rx="40" ry="30" fill="url(#spec)" opacity="0.7"/>

  <!-- typography -->
  <g font-family="'Hiragino Mincho ProN','Yu Mincho',serif">
    <text x="560" y="506" fill="#c9a86a" font-size="18" letter-spacing="6" opacity="0.9">AMBERGRIS  JAPAN</text>
    <line x1="562" y1="530" x2="662" y2="530" stroke="url(#gold)" stroke-width="1"/>
    <text x="558" y="626" fill="#f3f6fc" font-size="72" font-weight="600" letter-spacing="3">龍涎香ドリフト</text>
    <text x="562" y="690" fill="#dfe7f2" font-size="28" letter-spacing="3" opacity="0.85">海を漂い、育ち、香りになる。</text>
    <text x="562" y="740" fill="#9fb6d4" font-size="18" letter-spacing="2" opacity="0.7">月光や海藻を吸って育て、あなただけの龍涎香を浜へ。</text>
    <text x="560" y="800" fill="#c9a86a" font-size="14" letter-spacing="5" opacity="0.72">RYUZENKO  DRIFT</text>
  </g>

  <!-- hairline frame (within 1200x630 crop band: rows 285–915) -->
  <rect x="46" y="331" width="1108" height="538" fill="none" stroke="#c9a86a" stroke-width="1" opacity="0.45"/>
</svg>
