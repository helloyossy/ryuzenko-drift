<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1a34"/>
      <stop offset="1" stop-color="#04101f"/>
    </linearGradient>
    <radialGradient id="aura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e8d3a4" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#e8d3a4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="body" cx="0.4" cy="0.38" r="0.62">
      <stop offset="0" stop-color="#fbf4e4"/>
      <stop offset="1" stop-color="#8a7656"/>
    </radialGradient>
    <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c8e1ff" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#c8e1ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <g>
    <polygon points="150,0 230,0 300,1200 80,1200" fill="url(#ray)"/>
    <polygon points="470,0 550,0 630,1200 390,1200" fill="url(#ray)"/>
    <polygon points="800,0 880,0 970,1200 710,1200" fill="url(#ray)"/>
    <polygon points="1010,0 1090,0 1170,1200 930,1200" fill="url(#ray)"/>
  </g>
  <circle cx="335" cy="600" r="275" fill="url(#aura)"/>
  <circle cx="335" cy="600" r="150" fill="url(#body)" stroke="#d9b877" stroke-width="2"/>
  <g fill="none" stroke="#78645a" stroke-width="1.2" opacity="0.32">
    <circle cx="335" cy="600" r="30"/>
    <circle cx="335" cy="600" r="60"/>
    <circle cx="335" cy="600" r="90"/>
    <circle cx="335" cy="600" r="120"/>
  </g>
  <g font-family="'Hiragino Mincho ProN','Yu Mincho',serif" text-anchor="start">
    <text x="590" y="535" fill="#d9b877" font-size="25" letter-spacing="7">RYUZENKO　DRIFT</text>
    <text x="588" y="635" fill="#eef3fb" font-size="78" font-weight="600">龍涎香ドリフト</text>
    <text x="592" y="700" fill="#eef3fb" fill-opacity="0.80" font-size="30">海を漂い、育ち、香りになる。</text>
    <text x="592" y="752" fill="#9ec6e6" fill-opacity="0.72" font-size="20">月光・海藻・塩を吸って育て、浜へ漂着させるローグライト</text>
  </g>
</svg>
