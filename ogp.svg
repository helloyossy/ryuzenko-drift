<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#0c1d38"/>
      <stop offset="0.55" stop-color="#071528"/>
      <stop offset="1" stop-color="#030a15"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#cfe0ff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#9ab4dc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e8d8b4" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#e8d8b4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="stone" cx="0.36" cy="0.32" r="0.78">
      <stop offset="0" stop-color="#e9e3d4"/>
      <stop offset="0.5" stop-color="#cfc7b6"/>
      <stop offset="1" stop-color="#897f6c"/>
    </radialGradient>
    <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfe2ff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#cfe2ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c9a86a"/><stop offset="0.5" stop-color="#e6d3a3"/><stop offset="1" stop-color="#b8975a"/>
    </linearGradient>
    <clipPath id="stoneclip">
      <path d="M192,600 C188,520 250,470 322,468 C420,462 470,508 478,560 C520,560 540,628 500,672 C520,732 458,742 396,726 C330,760 250,742 232,690 C188,684 186,640 192,600 Z"/>
    </clipPath>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <polygon points="300,0 360,0 470,1200 250,1200" fill="url(#ray)"/>
  <polygon points="720,0 800,0 900,1200 690,1200" fill="url(#ray)"/>
  <g fill="#dce8ff">
    <circle cx="180" cy="360" r="2.5" opacity="0.5"/><circle cx="1040" cy="430" r="2" opacity="0.45"/>
    <circle cx="980" cy="780" r="3" opacity="0.4"/><circle cx="250" cy="840" r="2" opacity="0.5"/>
    <circle cx="120" cy="640" r="2.2" opacity="0.45"/><circle cx="1080" cy="600" r="1.8" opacity="0.4"/>
    <circle cx="860" cy="350" r="1.6" opacity="0.35"/>
  </g>

  <!-- ambergris stone -->
  <circle cx="345" cy="600" r="300" fill="url(#halo)"/>
  <circle cx="345" cy="600" r="220" fill="url(#aura)"/>
  <path d="M192,600 C188,520 250,470 322,468 C420,462 470,508 478,560 C520,560 540,628 500,672 C520,732 458,742 396,726 C330,760 250,742 232,690 C188,684 186,640 192,600 Z" fill="url(#stone)" stroke="#2a2622" stroke-width="2"/>
  <g clip-path="url(#stoneclip)" opacity="0.5">
    <path d="M150,560 Q330,520 540,600" fill="none" stroke="#fbf6ea" stroke-width="9" opacity="0.5"/>
    <path d="M150,640 Q330,690 540,610" fill="none" stroke="#7a715f" stroke-width="11" opacity="0.5"/>
    <path d="M170,600 Q360,640 520,560" fill="none" stroke="#efe8d8" stroke-width="6" opacity="0.45"/>
    <ellipse cx="300" cy="540" rx="70" ry="46" fill="#fffaf0" opacity="0.30"/>
  </g>
  <path d="M192,600 C188,520 250,470 322,468 C420,462 470,508 478,560 C520,560 540,628 500,672 C520,732 458,742 396,726 C330,760 250,742 232,690 C188,684 186,640 192,600 Z" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>

  <g font-family="'Hiragino Mincho ProN','Yu Mincho',serif">
    <text x="600" y="506" fill="#c9a86a" font-size="18" letter-spacing="6" opacity="0.9">AMBERGRIS  JAPAN</text>
    <line x1="602" y1="530" x2="702" y2="530" stroke="url(#gold)" stroke-width="1"/>
    <text x="598" y="626" fill="#f3f6fc" font-size="72" font-weight="600" letter-spacing="3">龍涎香ドリフト</text>
    <text x="602" y="690" fill="#dfe7f2" font-size="28" letter-spacing="3" opacity="0.85">海を漂い、育ち、香りになる。</text>
    <text x="602" y="740" fill="#9fb6d4" font-size="18" letter-spacing="2" opacity="0.7">月光や海藻を吸って育て、あなただけの龍涎香を浜へ。</text>
    <text x="600" y="800" fill="#c9a86a" font-size="14" letter-spacing="5" opacity="0.72">RYUZENKO  DRIFT</text>
  </g>
  <rect x="46" y="331" width="1108" height="538" fill="none" stroke="#c9a86a" stroke-width="1" opacity="0.45"/>
</svg>
