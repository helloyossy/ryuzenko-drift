<style>
  :root{
    --gold:#d9b877; --gold-soft:#e8d3a4; --ink:#eef3fb; --glass:rgba(8,18,34,.82);
    --serif:"Hiragino Mincho ProN","Yu Mincho",YuMincho,"Times New Roman",serif;
    --sans:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; background:#030b18; font-family:var(--sans); color:var(--ink); }
  #wrap { position:relative; width:100vw; height:100vh; touch-action:none; }
  canvas#cv { display:block; width:100%; height:100%; }

  #hud { position:absolute; top:0; left:0; right:0; padding:12px 16px; pointer-events:none; z-index:5; }
  .bar { height:8px; border-radius:5px; background:rgba(255,255,255,.10); overflow:hidden; margin-top:5px; }
  .bar > i { display:block; height:100%; width:0%; transition:width .1s linear; }
  #xpFill { background:linear-gradient(90deg,#8fd6e8,#cdb6e0); }
  #murkFill { background:linear-gradient(90deg,#c9a86a,#6e3522); }
  .row { display:flex; justify-content:space-between; font-size:11px; opacity:.8; letter-spacing:.12em; text-transform:none; }
  #topInfo { display:flex; justify-content:space-between; align-items:baseline; font-size:13px; letter-spacing:.06em; }
  #lvl { font-weight:600; font-size:15px; transition:transform .12s; color:var(--gold-soft); }
  #clock { font-variant-numeric:tabular-nums; opacity:.85; }
  #combo { position:absolute; top:104px; left:0; right:0; text-align:center; font-family:var(--serif);
           font-weight:600; font-size:32px; letter-spacing:.14em; color:var(--gold-soft);
           text-shadow:0 0 22px rgba(217,184,119,.55); opacity:0; transition:opacity .2s; pointer-events:none; z-index:5;}

  .panel { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
           background:radial-gradient(ellipse at 50% 35%,rgba(10,22,42,.72),rgba(3,9,20,.92));
           backdrop-filter:blur(6px); text-align:center; padding:26px; z-index:10; overflow-y:auto; }
  .panel.hidden { display:none; }
  h1 { font-family:var(--serif); font-size:30px; font-weight:600; letter-spacing:.18em; margin-bottom:6px; }
  h1 .small{ font-size:19px; letter-spacing:.12em; }
  .tag { font-size:11px; letter-spacing:.42em; color:var(--gold); opacity:.85; margin-bottom:14px; text-indent:.42em;}
  .tagline { font-family:var(--serif); font-size:14px; letter-spacing:.16em; color:var(--ink); opacity:.6; margin:2px 0 10px; }
  .dailyline { font-size:11.5px; letter-spacing:.06em; color:var(--gold-soft); opacity:.85; margin-bottom:14px; }
  .sub { font-size:13px; opacity:.66; max-width:440px; line-height:1.9; margin-bottom:24px; }
  .btn { pointer-events:auto; cursor:pointer; border:1px solid rgba(217,184,119,.5); border-radius:2px;
         padding:13px 30px; font-size:14px; font-weight:600; letter-spacing:.16em; margin:5px;
         color:#1a1206; background:linear-gradient(180deg,#e8d3a4,#cda85f); box-shadow:0 6px 22px rgba(120,90,30,.3); }
  .btn.ghost { color:var(--gold-soft); background:transparent; box-shadow:none; }
  .btn:active { transform:translateY(1px); }
  .essence{ font-size:13px; letter-spacing:.1em; color:var(--gold-soft); margin:4px 0 18px; }
  .essence b{ font-size:20px; font-family:var(--serif); }

  #upPanel .cards { display:flex; flex-direction:column; gap:11px; width:min(440px,90vw); }
  .card { pointer-events:auto; cursor:pointer; border:1px solid rgba(217,184,119,.22); border-radius:3px; padding:15px 18px;
          background:rgba(14,28,50,.78); text-align:left; transition:transform .08s, border-color .15s, background .15s; }
  .card:active { transform:scale(.985); }
  .card:hover { border-color:rgba(217,184,119,.6); background:rgba(20,38,64,.85); }
  .card .ttl { font-size:15px; font-weight:600; letter-spacing:.04em; margin-bottom:3px; }
  .card .dsc { font-size:11.5px; opacity:.66; line-height:1.6; }
  .card .ico { margin-right:9px; opacity:.9; }
  .card.locked{ opacity:.5; }
  .card .meta{ float:right; font-size:11px; color:var(--gold-soft); letter-spacing:.05em;}

  .list{ width:min(460px,92vw); display:flex; flex-direction:column; gap:9px; margin-bottom:18px; max-height:62vh; overflow-y:auto; padding:2px;}
  .grid{ width:min(520px,94vw); display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:18px; max-height:62vh; overflow-y:auto; padding:2px;}
  .gx{ border:1px solid rgba(217,184,119,.2); border-radius:3px; padding:11px 12px; background:rgba(12,24,44,.7); text-align:left; display:flex; align-items:center; gap:11px;}
  .gthumb{ width:56px; height:56px; flex:0 0 56px; }

  .gx .gn{ font-family:var(--serif); font-size:13.5px; line-height:1.4; margin-bottom:4px;}
  .gx .gs{ color:var(--gold); font-size:12px; letter-spacing:1px;}
  .gx .gp{ font-size:10.5px; opacity:.6; margin-top:2px;}
  .gx.empty{ opacity:.35; font-size:11px; display:flex; align-items:center; justify-content:center; min-height:54px;}

  #scent { width:min(440px,92vw); background:linear-gradient(180deg,rgba(18,34,60,.92),rgba(10,20,38,.92));
           border:1px solid rgba(217,184,119,.42); border-radius:4px; padding:24px 22px; margin-bottom:18px; text-align:left;
           box-shadow:0 10px 40px rgba(0,0,0,.4);}
  #scent .name { font-family:var(--serif); font-size:22px; font-weight:600; letter-spacing:.04em; margin-bottom:10px; line-height:1.5; }

  #detailPanel .dstars{ color:var(--gold); font-size:20px; letter-spacing:5px; margin:6px 0 14px;}
  #detailPanel .dline{ font-size:13px; opacity:.82; letter-spacing:.03em; margin:4px 0; max-width:min(460px,90vw); text-align:center; line-height:1.6;}

  .back{ margin-top:4px; }

<script>
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){ DPR=Math.min(window.devicePixelRatio||1,2); W=innerWidth; H=innerHeight;
  cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize',resize); resize();

// ===================== SAVE =====================
const SAVE_KEY='drift_save_v1';
function def(){ return {essence:0, perks:{ring0:0,murkres:0,xp0:0,essence0:0,shield0:0}, regions:['kuroshio'], codex:{}, best:{}, daily:{}, endlessBest:0, ach:{}}; }
let SAVE; try{ SAVE=Object.assign(def(),JSON.parse(localStorage.getItem(SAVE_KEY))||{}); SAVE.perks=Object.assign(def().perks,SAVE.perks||{}); }catch(e){ SAVE=def(); }
function save(){ try{ localStorage.setItem(SAVE_KEY,JSON.stringify(SAVE)); }catch(e){} }
function fmtTime(t){ const s=Math.floor(t); return Math.floor(s/60)+':'+('0'+(s%60)).slice(-2); }
const DAILY_MODS=[
  {k:'moon',name:'月夜',desc:'月光が満ちる'},
  {k:'storm',name:'時化',desc:'汚染が増える'},
  {k:'bloom',name:'豊穣',desc:'素材が多い'},
  {k:'calm',name:'凪',desc:'海が穏やか'},
];
function todayKey(){ const d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function dailyInfo(){ const key=todayKey(), h=hashNum(key); return {key, region:REGIONS[h%REGIONS.length], mod:DAILY_MODS[(Math.floor(h/7))%DAILY_MODS.length]}; }
function hashNum(s){ let h=0; for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))%100000; return h; }
const ACHS=[
  {id:'first',name:'初めての漂着',desc:'はじめて浜へ漂着する',test:c=>c.good},
  {id:'combo20',name:'連なる潮',desc:'コンボ20を達成',test:c=>c.maxCombo>=20},
  {id:'combo40',name:'途切れぬ流れ',desc:'コンボ40を達成',test:c=>c.maxCombo>=40},
  {id:'whale',name:'鯨との邂逅',desc:'鯨の記憶を吸い込む',test:c=>c.whale},
  {id:'pure',name:'澄みきった海',desc:'濁りゼロで漂着する',test:c=>c.good&&c.murk<1},
  {id:'star5',name:'五つ星の香り',desc:'★5の香りを生む',test:c=>c.stars>=5},
  {id:'grown',name:'大熟成',desc:'1回で110個吸収する',test:c=>c.absorbed>=110},
  {id:'score1500',name:'熟成の極み',desc:'スコア1500に到達',test:c=>c.score>=1500},
  {id:'endless120',name:'深淵の漂流者',desc:'エンドレスで2分生存',test:c=>c.endless&&c.t>=120},
  {id:'allregion',name:'七つの海',desc:'全海域を解放する',test:()=>SAVE.regions.length>=REGIONS.length},
  {id:'codex15',name:'蒐集家',desc:'香りを15種発見する',test:()=>Object.keys(SAVE.codex).length>=15},
  {id:'maxperk',name:'極めし者',desc:'全強化をMAXにする',test:()=>PERKS.every(p=>(SAVE.perks[p.id]||0)>=p.max)},
];
function checkAchievements(c){ SAVE.ach=SAVE.ach||{}; const got=[];
  ACHS.forEach(a=>{ if(!SAVE.ach[a.id] && a.test(c)){ SAVE.ach[a.id]=1; got.push(a.name); } }); return got; }

// ===================== DATA =====================
const REGIONS=[
  {id:'kuroshio',name:'黒潮',cost:0,   top:[12,32,60], places:['黒潮の縁','黒潮本流','潮目'],            bias:{}},
  {id:'amami',   name:'奄美',cost:90,  top:[14,42,54], places:['奄美の浜','加計呂麻','大島海峡'],         bias:{weed:1.6,salt:1.3}, pollMul:1.1},
  {id:'okinawa', name:'沖縄',cost:240, top:[8,48,60],  places:['沖縄本島','慶良間の海','宮古の浜'],       bias:{sun:1.6,salt:1.3}, pollMul:1.2},
  {id:'tokunoshima',name:'徳之島',cost:460,top:[16,34,50],places:['徳之島','犬の門蓋','金見崎'],          bias:{moon:1.6,weed:1.3}, pollMul:1.25},
  {id:'chiba',   name:'千葉',cost:760, top:[20,28,42], places:['九十九里','館山','犬吠埼'],               bias:{salt:1.3,microbe:1.5}, pollMul:1.45},
  {id:'shinkai', name:'深海',cost:1300,top:[5,11,26],  places:['深海平原','熱水噴出域','海溝の縁'],       bias:{moon:1.7,microbe:1.7}, pollMul:1.3},
];
const rById=id=>REGIONS.find(r=>r.id===id)||REGIONS[0];

const PERKS=[
  {id:'ring0',  name:'初期吸引リング', dsc:'開始時の吸引範囲が広がる', max:5, ico:'◎',  cost:l=>30+l*30, eff:l=>'+'+(l*6)+'%'},
  {id:'murkres',name:'濁り耐性',       dsc:'汚染ダメージを軽減',       max:5, ico:'🛡', cost:l=>40+l*40, eff:l=>'-'+(l*8)+'%'},
  {id:'xp0',    name:'熟成効率',       dsc:'EXP獲得量が増える',         max:5, ico:'⏱', cost:l=>40+l*35, eff:l=>'+'+(l*6)+'%'},
  {id:'essence0',name:'熟成エキス',    dsc:'エキス獲得量が増える',     max:5, ico:'✨', cost:l=>50+l*50, eff:l=>'+'+(l*10)+'%'},
  {id:'shield0',name:'初期シールド',   dsc:'開始時にシールドを持つ',   max:3, ico:'🌿', cost:l=>90+l*90, eff:l=>l+'枚'},
];

const MATS={
  moon:{label:'月光',color:'#cfe0ff',glow:'#8fb6ff',r:7},
  sun:{label:'太陽',color:'#ffe0a0',glow:'#f0b65a',r:7},
  weed:{label:'海藻',color:'#9ce0bb',glow:'#4fb585',r:8},
  salt:{label:'塩',color:'#ffffff',glow:'#cfe6ff',r:5},
  microbe:{label:'微生物',color:'#a8f0e4',glow:'#54cbb8',r:5},
  whale:{label:'鯨の記憶',color:'#ffe9b0',glow:'#ffcf66',r:11},
};
const POLL={
  plastic:{label:'プラ',color:'#d85f5f',r:10,murk:14},
  oil:{label:'油膜',color:'#352b44',r:15,murk:10},
  storm:{label:'嵐',color:'#7e93b0',r:21,murk:8},
};
const MILE=[15,35,60,90,130];
const PENTA=[0,3,5,7,10,12,15,17,19,22,24,27]; // minor pentatonic, always pleasant
let selRegion = SAVE.regions[SAVE.regions.length-1] || 'kuroshio';
const TT=90;

// ===================== AUDIO (premium) =====================
let AC=null, master=null, reverb=null, pad=null;
function makeIR(dur,decay){ const rate=AC.sampleRate, len=Math.floor(rate*dur), buf=AC.createBuffer(2,len,rate);
  for(let c=0;c<2;c++){ const d=buf.getChannelData(c); for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay); }
  return buf; }
function initAudio(){
  if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
    master=AC.createGain(); master.gain.value=0.5; master.connect(AC.destination);
    reverb=AC.createConvolver(); reverb.buffer=makeIR(2.6,2.4);
    const rg=AC.createGain(); rg.gain.value=0.55; reverb.connect(rg); rg.connect(master); }
  if(AC.state==='suspended') AC.resume();
}
function bell(freq,dur,gain){ if(!AC)return; const t=AC.currentTime;
  [[1,1],[2.01,0.35],[3,0.12]].forEach(([mul,amp])=>{ const o=AC.createOscillator(), g=AC.createGain();
    o.type='sine'; o.frequency.value=freq*mul;
    g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(gain*amp,t+0.014); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(master); g.connect(reverb); o.start(t); o.stop(t+dur+0.05); }); }
function sAbsorb(combo){ const semi=PENTA[Math.min(combo-1,PENTA.length-1)]||0; bell(523.25*Math.pow(2,semi/12),0.7,0.075); }
function sLevel(){ [0,3,7,12].forEach((s,i)=>setTimeout(()=>bell(523.25*Math.pow(2,s/12),1.0,0.085),i*70)); }
function sGrow(){ bell(392,1.1,0.08); }
function sArrive(){ [0,4,7,11,14].forEach((s,i)=>setTimeout(()=>bell(392*Math.pow(2,s/12),1.8,0.08),i*90)); }
function sHit(){ if(!AC)return; const t=AC.currentTime; const o=AC.createOscillator(), g=AC.createGain(), lp=AC.createBiquadFilter();
  lp.type='lowpass'; lp.frequency.value=420; o.type='sine'; o.frequency.setValueAtTime(190,t); o.frequency.exponentialRampToValueAtTime(72,t+0.3);
  g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.16,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+0.34);
  o.connect(g); g.connect(lp); lp.connect(master); lp.connect(reverb); o.start(t); o.stop(t+0.4); }
function startPad(){ if(!AC)return; stopPad(); const t=AC.currentTime; const pg=AC.createGain();
  pg.gain.setValueAtTime(0.0001,t); pg.gain.linearRampToValueAtTime(0.045,t+3.5); pg.connect(reverb); pg.connect(master);
  const arr=((G&&G.region&&MOOD[G.region.id]&&MOOD[G.region.id].pad)||[130.81,196.0,261.63]); pad={osc:[],gain:pg};
  arr.forEach((f,i)=>{ const o=AC.createOscillator(); o.type='sine'; o.frequency.value=f; o.detune.value=(i-1)*5; o.connect(pg); o.start(); pad.osc.push(o); }); }
function stopPad(){ if(!pad)return; const t=AC.currentTime; try{ pad.gain.gain.cancelScheduledValues(t); pad.gain.gain.setValueAtTime(pad.gain.gain.value,t);
  pad.gain.gain.exponentialRampToValueAtTime(0.0001,t+1.3); }catch(e){} pad.osc.forEach(o=>{try{o.stop(t+1.4);}catch(e){}}); pad=null; }

// ===================== GAME STATE =====================
let G, target={x:0,y:0};
function newGame(regionId){
  const R=rById(regionId), P=SAVE.perks;
  G={ running:false,t:0, region:R,
    x:W/2,y:H/2, px:W/2,py:H/2,
    baseR:14, grow:0, displayR:14,
    ring:96*(1+P.ring0*0.06), speed:0.13,
    xp:0,xpNext:6,level:1, murk:0, murkMul:1-P.murkres*0.08,
    shield:P.shield0, cleanse:0, moonPull:1, xpMult:1+P.xp0*0.06,
    essenceMul:1+P.essence0*0.10, pollMul:R.pollMul||1,
    combo:0,comboT:0,
    mats:[],polls:[],parts:[],pops:[],trail:[],
    counts:{moon:0,sun:0,weed:0,salt:0,microbe:0,whale:0}, absorbed:0,
    spawnT:0,pollT:0, shake:0, scaleX:1,scaleY:1, bump:0, levelFlash:0, mileIdx:0,
    phase:'play', arriveT:0, introT:2.2, tut:!SAVE.tutDone, seed:Math.floor(Math.random()*997)+1, maxCombo:0,
    mode:'normal', endless:false, matRate:1, dailyBias:null, dailyKey:null,
    surgeT:15, surgeCount:0, pulse:0, pulseT:0, sats:[],
    snow:[], rays:[], currents:[], curT:1.5, whaleT:6, whaleShadow:null,
    ended:false };
  for(let i=0;i<70;i++)G.snow.push({x:Math.random()*W,y:Math.random()*H,z:0.3+Math.random()*0.7,ph:Math.random()*6.28});
  for(let i=0;i<4;i++)G.rays.push({x:(i+0.5)/4*W+(Math.random()-0.5)*80,w:55+Math.random()*70,ph:Math.random()*6.28,sp:0.0003+Math.random()*0.0004});
  target.x=W/2; target.y=H/2;
}
function targetR(){ return G.baseR + Math.sqrt(G.grow)*2.7; }

function edgePos(m){ const e=Math.floor(Math.random()*4);
  if(e===0)return{x:-m,y:Math.random()*H}; if(e===1)return{x:W+m,y:Math.random()*H};
  if(e===2)return{x:Math.random()*W,y:-m}; return{x:Math.random()*W,y:H+m}; }
function pickMatType(){ const base={microbe:0.10,moon:0.22,salt:0.22,weed:0.24,sun:0.22}, bias=Object.assign({},G.region.bias||{},G.dailyBias||{});
  let tot=0,w={}; for(const k in base){ w[k]=base[k]*(bias[k]||1); tot+=w[k]; }
  let r=Math.random()*tot, k='sun'; for(const key in w){ if(r<w[key]){k=key;break;} r-=w[key]; } return k; }
function spawnMat(){
  if(Math.random()<0.022){ const p=edgePos(20), ang=Math.atan2(H/2-p.y,W/2-p.x)+(Math.random()-0.5), sp=0.14+Math.random()*0.18;
    G.mats.push({type:'whale',x:p.x,y:p.y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,pv:0,pop:0,...MATS.whale}); return; }
  const k=pickMatType(); const p=edgePos(20), ang=Math.atan2(H/2-p.y,W/2-p.x)+(Math.random()-0.5)*1.2, sp=0.2+Math.random()*0.3;
  G.mats.push({type:k,x:p.x,y:p.y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,pv:0,pop:0,...MATS[k]});
}
function spawnPoll(){ const keys=Object.keys(POLL), k=keys[Math.floor(Math.random()*keys.length)];
  const p=edgePos(30), ang=Math.atan2(H/2-p.y,W/2-p.x)+(Math.random()-0.5), sp=0.25+Math.random()*0.4+G.t*0.002;
  G.polls.push({type:k,x:p.x,y:p.y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,hit:false,...POLL[k]}); }
function triggerSurge(){ if(!G||!G.running)return; G.surgeCount=(G.surgeCount||0)+1; const treasure=G.surgeCount%3===0;
  pop(G.x,G.y-G.displayR-44, treasure?'宝の潮目':'潮目', treasure?'#ffe6a0':'#9fe0ff', true);
  ringFx(G.x,G.y, treasure?'#ffe6a0':'#9fe0ff');
  const R=Math.min(W,H)*0.55, N=treasure?16:14;
  for(let i=0;i<N;i++){ const a=i/N*6.283185+Math.random()*0.25, x=G.x+Math.cos(a)*R, y=G.y+Math.sin(a)*R, k=pickMatType();
    G.mats.push({type:k,x,y,vx:0,vy:0,pv:0,pop:0,...MATS[k]}); }
  if(treasure){ const a=Math.random()*6.283185; G.mats.push({type:'whale',x:G.x+Math.cos(a)*R,y:G.y+Math.sin(a)*R,vx:0,vy:0,pv:0,pop:0,...MATS.whale}); }
  for(let i=0;i<3;i++) spawnPoll();
}
function absorbMaterial(m){ const pr=G.displayR;
  G.counts[m.type]=(G.counts[m.type]||0)+1; G.absorbed++; G.combo++; if(G.combo>G.maxCombo)G.maxCombo=G.combo; G.comboT=1.4; updateCombo();
  const mult=1+Math.min(G.combo,15)*0.06;
  if(m.type==='whale'){ G.grow+=9*mult; G.xp+=7*G.xpMult*mult; G.bump=Math.min(0.85,G.bump+0.42);
    burst(m.x,m.y,'#ffcf66',24,3.4); ringFx(m.x,m.y,'#ffe9b0'); ringFx(G.x,G.y,'#ffcf66'); pop(m.x,m.y-12,'鯨の記憶','#ffe6a0',true); sGrow(); sLevel(); }
  else { G.grow+=mult; G.xp+=(m.type==='microbe'?2:1)*G.xpMult*mult; G.bump=Math.min(0.5,G.bump+0.16);
    burst(m.x,m.y,m.glow,m.type==='microbe'?14:8,2.2); pop(m.x,m.y-8,'+'+(G.combo>1?G.combo:1),m.glow,G.combo>=5); sAbsorb(G.combo); }
  G.scaleY+=0.12; G.scaleX-=0.06;
  if(G.mileIdx<MILE.length&&G.absorbed>=MILE[G.mileIdx]){ G.mileIdx++; ringFx(G.x,G.y,'#e8d3a4'); pop(G.x,G.y-pr-18,'育った','#e8d3a4',true); sGrow(); G.bump=Math.min(0.7,G.bump+0.3); }
  if(G.xp>=G.xpNext){ G.xp-=G.xpNext; G.level++; G.xpNext=Math.round(G.xpNext*1.35+3);
    const el=document.getElementById('lvl'); el.textContent='Lv.'+G.level; el.style.transform='scale(1.4)'; setTimeout(()=>el.style.transform='',150);
    G.levelFlash=0.4; ringFx(G.x,G.y,'#cdb6e0'); ringFx(G.x,G.y,'#8fd6e8'); sLevel(); offerUpgrades(); return true; }
  return false;
}

// ===================== FX =====================
function burst(x,y,color,n,spd){ for(let i=0;i<n;i++){ const a=Math.random()*6.28,s=(spd||2)*(0.4+Math.random());
  G.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color,r:1.4+Math.random()*1.8}); } }
function pop(x,y,text,color,big){ G.pops.push({x,y,text,color,life:1,vy:-0.8,size:big?22:13}); }
function ringFx(x,y,color){ G.parts.push({ringR:6,ringMax:130,x,y,life:1,color,isRing:true}); }

function setT(x,y){ target.x=x; target.y=y; }
cv.addEventListener('mousemove',e=>setT(e.clientX,e.clientY));
cv.addEventListener('touchstart',e=>{const t=e.touches[0];setT(t.clientX,t.clientY);},{passive:true});
cv.addEventListener('touchmove',e=>{const t=e.touches[0];setT(t.clientX,t.clientY);e.preventDefault();},{passive:false});

// ===================== LOOP =====================
let last=0;
function loop(now){ if(!G.running)return; const dt=Math.min(50,now-last); last=now; update(dt/16.67,dt/1000); render(); if(G.running)requestAnimationFrame(loop); }

function beginArrival(){ G.phase='arrive'; G.arriveT=0; G.mats=[]; G.polls=[]; ringFx(G.x,G.y,'#ffe9b0'); sGrow(); }
function arrivalStep(f,ds){
  G.arriveT+=ds;
  target.x+=(W/2-target.x)*0.05*f; target.y+=(H*0.40-target.y)*0.05*f;
  G.x+=(target.x-G.x)*0.07*f; G.y+=(target.y-G.y)*0.07*f;
  G.displayR+=(targetR()-G.displayR)*0.1*f; G.bump*=Math.pow(0.92,f);
  if(Math.random()<0.5) G.parts.push({x:G.x+(Math.random()-0.5)*100,y:G.y+60,vx:(Math.random()-0.5)*0.3,vy:-1-Math.random()*1.3,life:1,color:'#ffe9b0',r:1.4+Math.random()*2});
  for(let i=G.parts.length-1;i>=0;i--){ const pt=G.parts[i];
    if(pt.isRing){ pt.ringR+=(pt.ringMax-pt.ringR)*0.18*f; pt.life-=0.05*f; if(pt.life<=0)G.parts.splice(i,1); continue; }
    pt.x+=pt.vx*f; pt.y+=pt.vy*f; pt.vx*=0.96; pt.vy*=0.96; pt.life-=0.02*f; if(pt.life<=0)G.parts.splice(i,1); }
  if(G.arriveT>1.9) endGame(true);
}
function update(f,ds){
  if(G.phase==='arrive'){ arrivalStep(f,ds); return; }
  G.t+=ds; if(G.introT>0)G.introT-=ds; G.px=G.x; G.py=G.y;
  G.x+=(target.x-G.x)*G.speed*f; G.y+=(target.y-G.y)*G.speed*f;
  const dx=G.x-G.px, dy=G.y-G.py, spd=Math.hypot(dx,dy), stretch=Math.min(0.32,spd*0.011);
  G.scaleX+=((1+stretch)-G.scaleX)*0.2*f; G.scaleY+=((1-stretch*0.7)-G.scaleY)*0.2*f;
  G.displayR+=(targetR()-G.displayR)*0.14*f; G.bump*=Math.pow(0.86,f); if(G.levelFlash>0)G.levelFlash-=ds;
  G.trail.push({x:G.x,y:G.y}); if(G.trail.length>14)G.trail.shift();
  if(G.comboT>0){ G.comboT-=ds; if(G.comboT<=0){ G.combo=0; updateCombo(); } }

  G.spawnT-=ds; G.pollT-=ds;
  if(G.spawnT<=0){ spawnMat(); G.spawnT=0.42/(G.matRate||1); }
  if(G.pollT<=0){ spawnPoll(); G.pollT=Math.max(G.endless?0.24:0.5,1.6-G.t*0.012)/G.pollMul; }
  // 潮目（サージ）
  G.surgeT-=ds; if(G.surgeT<=0){ triggerSurge(); G.surgeT=15+Math.random()*6; }

  const pr=G.displayR;
  // 分け身の位置更新
  const orbit=pr+44; G.sats.forEach((s,k)=>{ s.ang=(s.ang||0)+0.045*f; s.x=G.x+Math.cos(s.ang)*orbit; s.y=G.y+Math.sin(s.ang)*orbit; });
  for(let i=G.mats.length-1;i>=0;i--){ const m=G.mats[i];
    if(m.pop<1)m.pop+=0.15*f;
    let tx=G.x, ty=G.y, pull=(m.type==='moon')?G.ring*G.moonPull:G.ring, absorbR=pr;
    const dP=Math.hypot(G.x-m.x,G.y-m.y);
    for(const s of G.sats){ const sd=Math.hypot(s.x-m.x,s.y-m.y); if(sd<88 && sd<dP){ tx=s.x; ty=s.y; pull=88; absorbR=14; } }
    const mx=tx-m.x, my=ty-m.y, dist=Math.hypot(mx,my)||0.01;
    if(dist<pull){ const cl=1-dist/pull; m.pv+=(0.6+cl*2.4)*f; const step=Math.min(dist,m.pv*f); m.x+=mx/dist*step; m.y+=my/dist*step; }
    else { m.x+=m.vx*f; m.y+=m.vy*f; m.pv=0; }
    if(dist<absorbR+m.r){ G.mats.splice(i,1); if(absorbMaterial(m))return; continue; }
    if(m.x<-60||m.x>W+60||m.y<-60||m.y>H+60)G.mats.splice(i,1);
  }
  for(let i=G.polls.length-1;i>=0;i--){ const p=G.polls[i];
    if(p.type==='oil'&&!p.hit){ const a=Math.atan2(G.y-p.y,G.x-p.x); p.vx+=Math.cos(a)*0.05*f; p.vy+=Math.sin(a)*0.05*f; const sp=Math.hypot(p.vx,p.vy); if(sp>1.6){ p.vx*=1.6/sp; p.vy*=1.6/sp; } }
    p.x+=p.vx*f; p.y+=p.vy*f;
    const dist=Math.hypot(G.x-p.x,G.y-p.y);
    if(!p.hit&&dist<pr+p.r){ p.hit=true;
      if(G.shield>0){ G.shield--; burst(p.x,p.y,'#9ce0bb',12,2.5); pop(p.x,p.y,'シールド','#9ce0bb'); }
      else { G.murk=Math.min(100,G.murk+p.murk*G.murkMul); G.combo=0; updateCombo();
        burst(p.x,p.y,'#c9a86a',12,3); pop(p.x,p.y,'濁り','#d8b070'); sHit(); G.shake=Math.min(14,G.shake+8);
        const a=Math.atan2(G.y-p.y,G.x-p.x); G.x+=Math.cos(a)*12; G.y+=Math.sin(a)*12; } }
    if(p.x<-80||p.x>W+80||p.y<-80||p.y>H+80)G.polls.splice(i,1);
  }
  // 波動（アクティブ）
  if(G.pulse>0){ G.pulseT-=ds; if(G.pulseT<=0){ G.pulseT=Math.max(1.6,5-(G.pulse-1)*0.7);
    const R=150+G.pulse*45; ringFx(G.x,G.y,'#9fe0ff'); ringFx(G.x,G.y,'#cfe9ff'); sGrow();
    for(const p of G.polls){ const d=Math.hypot(G.x-p.x,G.y-p.y); if(d<R){ const a=Math.atan2(p.y-G.y,p.x-G.x)||0; p.vx=Math.cos(a)*7; p.vy=Math.sin(a)*7; p.hit=true; burst(p.x,p.y,'#9fe0ff',6,2); } } } }
  if(G.cleanse>0&&G.murk>0)G.murk=Math.max(0,G.murk-G.cleanse*ds*4);
  G.shake*=Math.pow(0.85,f);
  for(let i=G.parts.length-1;i>=0;i--){ const pt=G.parts[i];
    if(pt.isRing){ pt.ringR+=(pt.ringMax-pt.ringR)*0.18*f; pt.life-=0.05*f; if(pt.life<=0)G.parts.splice(i,1); continue; }
    pt.x+=pt.vx*f; pt.y+=pt.vy*f; pt.vx*=0.93; pt.vy*=0.93; pt.life-=0.035*f; if(pt.life<=0)G.parts.splice(i,1); }
  for(let i=G.pops.length-1;i>=0;i--){ const q=G.pops[i]; q.y+=q.vy*f; q.life-=0.022*f; if(q.life<=0)G.pops.splice(i,1); }

  document.getElementById('xpFill').style.width=(G.xp/G.xpNext*100)+'%';
  document.getElementById('murkFill').style.width=G.murk+'%';
  document.getElementById('murkPct').textContent=Math.round(G.murk)+'%';
  document.getElementById('clock').textContent=G.endless?fmtTime(G.t):(Math.max(0,Math.ceil(TT-G.t))+'"');
  if(G.murk>=100)endGame(!!G.endless); else if(!G.endless && G.t>=TT)beginArrival();
}
function updateCombo(){ const el=document.getElementById('combo');
  if(G.combo>=3){ el.textContent=G.combo+' COMBO'; el.style.opacity='1'; el.style.transform='scale(1.12)'; setTimeout(()=>el.style.transform='scale(1)',90); }
  else el.style.opacity='0'; }

// ===================== RENDER =====================
// ---- 龍涎香（アンバーグリス）描画：マーブルのいびつな蝋状の塊 ----
function hashName(s){ let h=0; s=String(s||''); for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))%100000; } return h; }
const _cl=v=>Math.max(0,Math.min(255,Math.round(v)));
const _sh=(a,d)=>[_cl(a[0]+d),_cl(a[1]+d),_cl(a[2]+d)];
const DOMBIAS={moon:[-8,-2,14],sun:[16,7,-10],weed:[-8,10,-4],salt:[6,6,9],microbe:[-10,9,7],whale:[18,9,-12]};
function ambergrisBase(grade,dom){ const lo=[50,46,50], hi=[214,208,196];
  let b=lo.map((c,i)=>c+(hi[i]-c)*grade); const bias=DOMBIAS[dom]; if(bias)b=b.map((c,i)=>c+bias[i]*0.6); return b.map(_cl); }
function ambergrisPath(g,cx,cy,r,seed){ const N=11, pts=[];
  for(let i=0;i<N;i++){ const a=i/N*6.283185, rr=r*(0.80+0.13*Math.sin(seed*0.7+i*1.7)+0.07*Math.sin(seed*1.9+i*3.3));
    pts.push([cx+Math.cos(a)*rr, cy+Math.sin(a)*rr]); }
  g.beginPath(); g.moveTo((pts[0][0]+pts[N-1][0])/2,(pts[0][1]+pts[N-1][1])/2);
  for(let i=0;i<N;i++){ const p=pts[i], n=pts[(i+1)%N]; g.quadraticCurveTo(p[0],p[1],(p[0]+n[0])/2,(p[1]+n[1])/2); }
  g.closePath(); }
function drawAmbergris(g,cx,cy,r,o){
  o=o||{}; const grade=o.grade==null?0.5:o.grade, pure=o.pure==null?1:o.pure, seed=o.seed||1, base=ambergrisBase(grade,o.dom);
  if(o.aura!==false){ let a=g.createRadialGradient(cx,cy,r*0.6,cx,cy,r*1.7);
    a.addColorStop(0,'rgba(232,219,188,'+(0.12+grade*0.12)+')'); a.addColorStop(1,'rgba(232,219,188,0)');
    g.fillStyle=a; g.beginPath(); g.arc(cx,cy,r*1.7,0,6.283185); g.fill(); }
  ambergrisPath(g,cx,cy,r,seed);
  g.save(); g.shadowBlur=r*0.28; g.shadowColor='rgba(0,0,0,0.40)';
  let gr=g.createRadialGradient(cx-r*0.32,cy-r*0.38,r*0.15,cx,cy,r*1.15);
  gr.addColorStop(0,'rgb('+_sh(base,30).join(',')+')'); gr.addColorStop(1,'rgb('+_sh(base,-34).join(',')+')');
  g.fillStyle=gr; g.fill(); g.shadowBlur=0; g.clip();
  for(let i=0;i<6;i++){ const ph=seed*0.5+i*2.27, y0=cy+Math.sin(ph)*r*0.6;
    g.beginPath(); g.moveTo(cx-r*1.1,y0);

function generateScent(good){
  const c=G.counts, entries=Object.entries(c).sort((a,b)=>b[1]-a[1]), dom=entries[0][0], pure=Math.max(0,1-G.murk/100);
  const wh=c.whale||0;
  const stars=good?Math.max(1,Math.min(5,Math.round(1+G.absorbed/22+pure*2+wh*0.5))):Math.max(1,Math.min(3,Math.round(1+G.absorbed/40)));
  const grade=Math.min(1,G.absorbed/130);
  const domAdj={moon:'月光を抱いた',sun:'太陽に乾かされた',weed:'海藻の眠りをまとった',salt:'塩に磨かれた',microbe:'静かに熟成した',whale:'鯨の記憶を宿した'};
  // 熟成の度合い（接頭辞）
  const matWord=['','ほのかに熟れた','円熟した','古色の','時を重ねた'][Math.min(4,Math.floor(grade*5))];
  // 色味（成分・純度・熟成で分岐）→ 収集の幅を広げる
  let colorWord;
  if(G.murk>55) colorWord='墨を帯びた';
  else if(c.salt>=Math.max(c.moon,c.sun) && pure>0.7) colorWord=(grade>0.7?'銀白の':'白い');
  else if((c.moon||0)>=(c.sun||0) && (c.moon||0)>0) colorWord=(grade>0.7?'青銀の':'青みがかった');
  else if((c.sun||0)>0) colorWord=(grade>0.7?'琥珀色の':'黄金の');
  else if((c.weed||0)>0) colorWord=(grade>0.6?'深緑の':'苔色の');
  else colorWord=(grade>0.6?'鈍色の':'灰の');
  const name=good?(matWord+(domAdj[dom]||'')+colorWord+'龍涎香'):'濁りを帯びた龍涎香';
  const nw={moon:'月光',sun:'乾いた光',weed:'海藻',salt:'塩',microbe:'熟成した動物性',whale:'鯨の記憶'};
  const notes=[]; entries.forEach(([k,v])=>{ if(v>0)notes.push(nw[k]); }); if(G.murk>40)notes.push('かすかな濁り'); if(!notes.length)notes.push('海の気配');
  const pl=G.region.places, place=good?pl[Math.min(pl.length-1,Math.floor(G.absorbed/30))]:'濁った入り江';
  const state=!good?'濁りきって沈んだ':(wh>0&&pure>0.7?'鯨の記憶を抱いた、伝説の香り':(pure>0.85&&G.absorbed>60?'静かに深まった、稀有な香り':(pure>0.6?'まろやかに整った香り':'荒れた海を越えてきた香り')));
  const vis={dom, grade, pure, whale:wh>0, stars, seed:G.seed};
  return {name,stars,note:notes.join('、'),place,state,region:G.region.name,vis};
}

  document.getElementById('achCount').textContent=got; document.getElementById('achTotal').textContent=ACHS.length;
  const box=document.getElementById('achList'); box.innerHTML='';
  ACHS.forEach(a=>{ const on=!!SAVE.ach[a.id]; const d=document.createElement('div'); d.className='card'+(on?'':' locked');
    d.innerHTML='<div class="ttl">'+(on?'🏅 ':'🔒 ')+a.name+'</div><div class="dsc">'+a.desc+'</div>'; box.appendChild(d); }); }

function renderRegions(){ document.getElementById('regionEssence').textContent=SAVE.essence;
  const box=document.getElementById('regionList'); box.innerHTML='';
  REGIONS.forEach(R=>{ const owned=SAVE.regions.includes(R.id), d=document.createElement('div'); d.className='card'+(owned?'':' locked');
    const sel=(selRegion===R.id)?' ✓':'';
    const best=(SAVE.best&&SAVE.best[R.id])||0;
    d.innerHTML='<div class="ttl">'+R.name+sel+'<span class="meta">'+(owned?'選択':'🔒 '+R.cost)+'</span></div>'+
      '<div class="dsc">'+(owned?('この海域で漂う'+(best?'　最高 '+best:'')):'熟成エキス '+R.cost+' で解放')+'</div>';
    d.onclick=()=>{ if(owned){ selRegion=R.id; save(); renderRegions(); }
      else if(SAVE.essence>=R.cost){ SAVE.essence-=R.cost; SAVE.regions.push(R.id); selRegion=R.id; save(); renderRegions(); } };
    box.appendChild(d); }); }

function renderShop(){ document.getElementById('shopEssence').textContent=SAVE.essence;
  const box=document.getElementById('shopList'); box.innerHTML='';
  PERKS.forEach(P=>{ const lv=SAVE.perks[P.id]||0, maxed=lv>=P.max, cost=P.cost(lv), d=document.createElement('div'); d.className='card'+(maxed?' locked':'');
    d.innerHTML='<div class="ttl"><span class="ico">'+P.ico+'</span>'+P.name+' <span style="opacity:.6;font-size:12px">Lv.'+lv+'/'+P.max+'</span>'+
      '<span class="meta">'+(maxed?'MAX':'➤ '+cost)+'</span></div>'+
      '<div class="dsc">'+P.dsc+'（現在 '+P.eff(lv)+'）</div>';
    d.onclick=()=>{ if(maxed)return; if(SAVE.essence>=cost){ SAVE.essence-=cost; SAVE.perks[P.id]=lv+1; save(); renderShop(); } };
    box.appendChild(d); }); }

function renderCodex(){ const keys=Object.keys(SAVE.codex); document.getElementById('codexCount').textContent=keys.length;
  const box=document.getElementById('codexGrid'); box.innerHTML='';
  if(!keys.length){ const e=document.createElement('div'); e.className='gx empty'; e.textContent='まだ香りを見つけていない'; e.style.gridColumn='1/3'; box.appendChild(e); return; }
  keys.map(k=>SAVE.codex[k]).map((v,i)=>({v,name:keys[i]})).sort((a,b)=>b.v.stars-a.v.stars).forEach(({v,name})=>{
    const d=document.createElement('div'); d.className='gx';
    const cvn=document.createElement('canvas'); cvn.width=120; cvn.height=120; cvn.className='gthumb';
    const vis=v.vis||{dom:'salt',grade:Math.min(1,(v.stars||1)/5),pure:1,whale:false,stars:v.stars||1};
    drawPearlThumb(cvn.getContext('2d'),120,vis,name);
    const tx=document.createElement('div'); tx.className='gtext';
    tx.innerHTML='<div class="gn">'+name+'</div><div class="gs">'+'★'.repeat(v.stars)+'☆'.repeat(5-v.stars)+'</div><div class="gp">'+(v.place||'')+'｜'+(v.region||'')+'</div>';
    d.appendChild(cvn); d.appendChild(tx); d.style.cursor='pointer'; d.onclick=()=>openDetail(name); box.appendChild(d); }); }

let detailName=null;
function openDetail(name){ const e=SAVE.codex[name]; if(!e)return; detailName=name;
  const vis=e.vis||{dom:'salt',grade:Math.min(1,(e.stars||1)/5),pure:1,whale:false,stars:e.stars||1};
  drawPearlThumb(document.getElementById('detailCanvas').getContext('2d'),320,vis,name);
  document.getElementById('dName').textContent=name;
  document.getElementById('dStars').textContent='★'.repeat(e.stars)+'☆'.repeat(5-e.stars);
  document.getElementById('dNote').textContent='ノート：'+(e.note||'');
  document.getElementById('dPlace').textContent='漂着地：'+(e.place||'')+'（'+(e.region||'')+'）';
  document.getElementById('dState').textContent=e.state?('状態：'+e.state):'';
  show('detailPanel');
}

// ===================== START / END =====================
function applyDailyMod(mod){ if(!mod)return;
  if(mod.k==='moon')G.dailyBias={moon:2.4}; else if(mod.k==='storm')G.pollMul*=1.6;
  else if(mod.k==='bloom')G.matRate=1.5; else if(mod.k==='calm')G.pollMul*=0.55; }
let lastMode='normal';
function startRun(mode){ initAudio(); mode=mode||'normal'; lastMode=mode;
  let region=selRegion, di=null;
  if(mode==='daily'){ di=dailyInfo(); region=di.region.id; }
  newGame(region); G.mode=mode;
  if(mode==='daily'){ G.region=di.region; G.dailyKey=di.key; applyDailyMod(di.mod); G.introT=2.6; }
  if(mode==='endless'){ G.endless=true; }
  startPad(); G.running=true;
  document.getElementById('regionName').textContent=(mode==='endless'?'深淵 ∞':(mode==='daily'?'今日の海・'+G.region.name:G.region.name));
  document.getElementById('lvl').textContent='Lv.1';
  show(null); last=performance.now(); requestAnimationFrame(loop); }
function startGame(){ startRun('normal'); }

let lastScent=null;
function endGame(good){ if(G.ended)return; G.ended=true; G.running=false; stopPad();
  const grade=Math.min(1,G.absorbed/130);
  const s=generateScent(good); lastScent=s; if(good)sArrive(); else sHit();
  let score, earned, headline, extra='';
  if(G.endless){
    score=Math.round(G.absorbed*10 + (G.maxCombo||0)*8 + Math.floor(G.t)*15 + grade*150);
    earned=Math.max(1,Math.round(score*0.4*G.essenceMul)); SAVE.essence+=earned;
    SAVE.endlessBest=SAVE.endlessBest||0; const eb=score>SAVE.endlessBest; if(eb)SAVE.endlessBest=score;
    headline='深淵の果て';
    extra='漂流 '+fmtTime(G.t)+'　'+(eb?'<span style="color:#e8d3a4">★自己ベスト</span>　':'')+'自己ベスト '+SAVE.endlessBest;
  } else {
    score=Math.round(G.absorbed*10 + (G.maxCombo||0)*8 + s.stars*60 + grade*150 + (good?200:0));
    earned=Math.max(1,Math.round((G.absorbed*2 + s.stars*15 + grade*45)*G.essenceMul*(good?1:0.4))); SAVE.essence+=earned;
    SAVE.best=SAVE.best||{}; const rid=G.region.id; const isBest=!SAVE.best[rid]||score>SAVE.best[rid]; if(isBest)SAVE.best[rid]=score;
    headline=good?'漂着しました':'濁ってしまった…';
    if(isBest)extra='<span style="color:#e8d3a4">★最高記録</span>　';
    if(G.mode==='daily'){ SAVE.daily=SAVE.daily||{}; if(SAVE.daily.date!==G.dailyKey)SAVE.daily={date:G.dailyKey,best:0};
      if(score>SAVE.daily.best)SAVE.daily.best=score; extra+='今日の海ベスト '+SAVE.daily.best+'　'; }
  }
  const ex=SAVE.codex[s.name]; if((good||G.endless)&&(!ex||s.stars>ex.stars)) SAVE.codex[s.name]={stars:s.stars,note:s.note,place:s.place,region:s.region,state:s.state,vis:s.vis};
  const rank = score>=1600?'龍涎香の達人': score>=1000?'熟成師': score>=500?'漂流者':'見習い';
  const got=checkAchievements({good:good&&!G.endless,stars:s.stars,maxCombo:G.maxCombo||0,whale:(G.counts.whale||0)>0,murk:G.murk,absorbed:G.absorbed,grade,score,endless:!!G.endless,t:G.t});
  SAVE.tutDone=1; save();
  document.getElementById('endTitle').textContent=headline;
  document.getElementById('sName').textContent=s.name;
  document.getElementById('sStars').textContent='★'.repeat(s.stars)+'☆'.repeat(5-s.stars);
  document.getElementById('sNote').textContent='ノート：'+s.note;
  document.getElementById('sPlace').textContent='漂着地：'+s.place+'（'+s.region+'）';
  document.getElementById('sState').textContent='状態：'+s.state;
  document.getElementById('earned').innerHTML='エキス +'+earned+'　／　スコア <b style="color:#fff">'+score+'</b>　［'+rank+'］<br>'+extra+'最高コンボ '+(G.maxCombo||0)+'　所持 '+SAVE.essence+(got.length?'<br><span style="color:#e8d3a4">実績解除：'+got.join('・')+'</span>':'');
  show('endPanel');
}

// ===================== SHARE IMAGE =====================
function drawShare(s){
  const c=document.createElement('canvas'); c.width=900; c.height=1120; const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,1120); g.addColorStop(0,'#0a1830'); g.addColorStop(1,'#040c1a'); x.fillStyle=g; x.fillRect(0,0,900,1120);
  x.strokeStyle='rgba(217,184,119,.55)'; x.lineWidth=2; x.strokeRect(34,34,832,1052);
  x.strokeStyle='rgba(217,184,119,.25)'; x.strokeRect(46,46,808,1028);
  x.textAlign='center'; x.fillStyle='#d9b877'; x.font='600 22px serif'; x.fillText('R Y U Z E N K O   D R I F T',450,110);
  // 龍涎香（図鑑と同じ描画）
  const v=s.vis||{};
  drawAmbergris(x,450,400,150,{grade:(v.grade!=null)?v.grade:Math.min(1,s.stars/5), pure:(v.pure!=null)?v.pure:1, whale:!!v.whale, seed:(v.seed!=null)?v.seed:hashName(s.name), dom:v.dom});
  // texts
  x.fillStyle='#eef3fb'; x.font='600 40px serif';
  wrap(x,s.name,450,690,760,50);
  x.fillStyle='#d9b877'; x.font='34px serif'; x.fillText('★'.repeat(s.stars)+'☆'.repeat(5-s.stars),450,790);
  x.fillStyle='rgba(238,243,251,.82)'; x.font='22px serif';
  x.fillText('ノート　'+s.note,450,860);
  x.fillText('漂着地　'+s.place+'（'+s.region+'）',450,902);
  x.fillStyle='rgba(238,243,251,.6)'; x.font='20px serif'; x.fillText(s.state,450,966);
  x.fillStyle='rgba(217,184,119,.7)'; x.font='18px serif'; x.fillText('— 龍涎香ドリフト —',450,1040);
  return c.toDataURL('image/png');
}
function wrap(x,text,cx,cy,maxW,lh){ const ch=[...text]; let line='',y=cy,lines=[];
  for(const c of ch){ if(x.measureText(line+c).width>maxW){ lines.push(line); line=c; } else line+=c; } lines.push(line);
  const start=cy-(lines.length-1)*lh/2; lines.forEach((l,i)=>x.fillText(l,cx,start+i*lh)); }

// ===================== WIRING =====================
document.getElementById('goBtn').onclick=()=>startRun('normal');
document.getElementById('dailyBtn').onclick=()=>startRun('daily');
document.getElementById('endlessBtn').onclick=()=>startRun('endless');
document.getElementById('againBtn').onclick=()=>startRun(lastMode);
document.getElementById('homeBtn2').onclick=showHome;
document.getElementById('regionBtn').onclick=()=>{ renderRegions(); show('regionPanel'); };
document.getElementById('shopBtn').onclick=()=>{ renderShop(); show('shopPanel'); };
document.getElementById('codexBtn').onclick=()=>{ renderCodex(); show('codexPanel'); };
document.getElementById('achBtn').onclick=()=>{ renderAch(); show('achPanel'); };
document.querySelectorAll('[data-home]').forEach(b=>b.onclick=showHome);
function downloadShare(s){ const url=drawShare(s); const a=document.createElement('a'); a.href=url; a.download='龍涎香_'+s.name+'.png'; document.body.appendChild(a); a.click(); a.remove(); }
document.getElementById('shareBtn').onclick=()=>{ if(lastScent)downloadShare(lastScent); };
document.getElementById('dBackBtn').onclick=()=>{ renderCodex(); show('codexPanel'); };
document.getElementById('dShareBtn').onclick=()=>{ const e=SAVE.codex[detailName]; if(!e)return;
  downloadShare({name:detailName,stars:e.stars,note:e.note,place:e.place,region:e.region,state:e.state||'',vis:e.vis}); };

newGame(selRegion); G.running=false;
(function idle(){ if(!G||!G.running)render(); requestAnimationFrame(idle); })();
showHome();
</script>
